name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: swift test
    # KNOWN COVERAGE GAP: macOS 26 isn't a GitHub-hosted runner image
    # yet, so the CompanionRuntimePatch interposer (Sources/Companion-
    # RuntimePatch/Interpose.c) is NOT exercised in CI — its hooks
    # no-op cleanly on this Sonoma runner via the version check in
    # install_runtime_hooks. The workaround stays load-bearing on
    # 26.x dev machines until Apple fixes the runtime; tracked
    # alongside the C target's REMOVE_WHEN block. Add a `macos-26`
    # matrix entry the day GitHub Actions adds the image — at that
    # point CI catches any future regression in the interpose path
    # before a release.
    runs-on: macos-latest

    steps:
      - name: Checkout
        # Pinned to commit SHA (v4.2.2). Updating: visit
        # https://github.com/actions/checkout/releases, copy the new
        # tag's commit SHA, paste here.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Show toolchain
        run: swift --version

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test --enable-test-discovery
